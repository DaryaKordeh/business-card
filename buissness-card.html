<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Card</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>
<body>

  <div class="card">
    <img src="../01/photo/IMG_3630.JPG" alt="Profile">
    <div class="overlay">
      <h2>Darya Kordeh<i class="fas fa-check-circle" style="color:#4da6ff;"></i></h2>
      <p>I’m a Software Engineer who focuses on clarity & emotional connection.</p>
      <div class="stats">
        <div><i class="fas fa-star"></i><span>4.8<br>Rating</span></div>
        <div><i class="fas fa-dollar-sign"></i><span>$45k+<br>Earned</span></div>
        <div><i class="fas fa-clock"></i><span>$50/hr<br>Rate</span></div>
      </div>
      <div class="buttons">
        <a href="mailto:your@email.com"><i class="fas fa-envelope"></i> Get In Touch</a>
        <a href="#" class="icon-only"><i class="fas fa-bookmark"></i></a>
      </div>
    </div>
  </div>

</body>
</html>
